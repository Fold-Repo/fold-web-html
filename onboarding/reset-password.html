<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery</title>
    <!-- <link rel="stylesheet" href="../assets/css/main.css" />
    <script src="https://cdn.tailwindcss.com"></script> -->
     <link rel="stylesheet" href="/assets/css/app.css">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <main class="container-fluid mx-auto overflow-x-hidden">

        <!-- New Password Page -->
        <div class="min- h-screen flex justify-between">
            <div class="w-full md:w-1/2 flex items-center justify-center p-4">
                <div class="w-full max-w-xl p-8 bg-white rounded-lg">
                    <div class="mb-8">
                       
                        <img src="../assets/icons/logo.svg" />
                        <h2 class="text-xl font-semibold text-gray-800 mb-2 mt-4">Forgot Password?</h2>
                        <p class="text-gray-800">Be a part of the community of shoppers starting now.</p>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-800 mb-1">Enter New Password</label>
                            <input
                                type="password"
                                placeholder="Enter Password"
                                                      class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"

                            />
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-800 mb-1">Re-enter New Password</label>
                            <input
                                type="password"
                                placeholder="Re-enter Password"
                                                      class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"

                            />
                        </div>
                        
                  <section class="pt-6 space-y-4">
                    <button class="w-full py-3.5 px-4 bg-blue-500 text-white rounded-md ">
                        Reset Password
                    </button>
                    
                    <button class="w-full py-3.5 px-4 border border-blue-500 text-sky-500 rounded-md hover:bg-gray-50 transition-colors">
                        Back
                    </button>
                  </section>
                    </div>
                </div>
            </div>
            
            <!-- Right side - Image with additional text -->
           <div class="hidden md:flex md:w-1/2 items-center justify-end">
                <img
                    src="../assets/images/onboarding/reset.svg"
                    alt="Shopping"
                    class="max-h-full max-w-full"
                />
            </div>
        </div>
    </main>
</body>
</html>
