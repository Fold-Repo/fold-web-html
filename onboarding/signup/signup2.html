<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
   

        <link rel="stylesheet" href="/assets/css/app.css">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container-fluid mx-auto overflow-x-hidden">
      <div class="min-h-screen flex items-center justify-center bg-white p-4 md:p-8">
        <div class="max-w-xl  border-2 border-gray-200 rounded-lg shadow-md py-6 mx-auto gap-8">
          <div class="w-full p-8  flex flex-col justify-center items-center">
           
            <div class="w-12 h-12 flex justify-center items-center rounded-md">
              <img src="../../assets/icons/logo.svg" alt="Logo" class="w-full" />
            </div>
            <div class="text-center">

              <h2 class="text-xl font-semibold text-dark mb-2">Get Started Here!</h2>
              <p class="text-gray-600 text-[20px] mb-6">
                Be a part of the community of shoppers starting now.
              </p>
            </div>
            <form class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div class="">
                  <label class="text-slate-500 text-sm font-semibold" for="f_name">First Name</label>
                  <input
                    type="text"
                    placeholder="First Name"
                    class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                  />
                </div>
                <div class="">
                  <label class="text-slate-500 text-sm font-semibold" for="l_name">Last Name</label>
                  
                  <input
                    type="text"
                    placeholder="Last Name"
                    class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                  />
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="">
                  <label class="text-slate-500 text-sm font-semibold" for="phone">Phone Number</label>
                 <input
                  type="tel"
                  placeholder="Phone Number"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
                </div>
                <div class="">
                  <label class="text-slate-500 text-sm font-semibold" for="email">Email Address</label>
                  
                   <input
                  type="email"
                  placeholder="Email Address"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
                </div>
              </div>
             
              <div class="">
                <label class="text-slate-500 text-sm font-semibold" for="password">Password</label>
               <input
              type="password"
              placeholder="Password"
              class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
            />
              </div>
              <div class="">
                <label class="text-slate-500 text-sm font-semibold" for="c_password">Confirm Password</label>
                
                 <input
              type="password"
              placeholder="Confirm Password"
              class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
            />
              </div>
              
              
              <div class="flex items-start">
                <input
                  type="checkbox"
                  id="terms"
                  class="mt-1 rounded border-gray-200 text-blue-500 focus:ring-blue-500"
                />
                <label for="terms" class="ml-2 text-gray text-sm peer-checked:bg-blue-500 peer-checked:border-blue-500 peer-checked:text-white inline-block">
                  Send important information and login details to the provided
                  email address for documentation.
                </label>
              </div>
              <button
                class="w-full bg-blue-500 text-white py-3 rounded bg-blue-500 transition"
              >
                Register
              </button>
              <p class="text-center text-blue-500">
                Already have an account?
                <a href="/onboarding/login/login.html" class="text-blue-500 hover:underline">Sign In</a>
              </p>
            </form>
          </div>
         
        </div>
      </div>

    </main>
  </body>
</html>
