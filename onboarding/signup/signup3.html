<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">

  </head>
  <body>
    <div class="min-h-screen bg-white p-4 md:p-8">
      <div class="max-w-6xl  mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="w-full flex flex-col items-center">
          <div class="w-full max-w-lg">
            <div class="mb-8 flex items-center">
              <div class="w-12 h-12 rounded-lg flex items-center justify-center">
                <img src="../../assets/icons/logo.svg" alt="Logo" class="w-full" />
              </div>
            </div>
            <h2 class="text-xl font-semibold text-gray-800 mb-2">Get Started Here!</h2>
            <p class="text-gray-600 mb-6">
              Be a part of the community of shoppers starting now.
            </p>
            <form class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div class="">
                  <label class="text-dark2 text-sm font-semibold" for="f_name">First Name</label>
                  <input
                    type="text"
                    placeholder="First Name"
                    class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                  />
                </div>
                <div class="">
                  <label class="text-dark2 text-sm font-semibold" for="l_name">Last Name</label>
                  
                  <input
                    type="text"
                    placeholder="Last Name"
                    class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                  />
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="">
                  <label class="text-dark2 text-sm font-semibold" for="phone">Phone Number</label>
                 <input
                  type="tel"
                  placeholder="Phone Number"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
                </div>
                <div class="">
                  <label class="text-dark2 text-sm font-semibold" for="email">Email Address</label>
                  
                   <input
                  type="email"
                  placeholder="Email Address"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
                </div>
              </div>
             
              <div class="">
                <label class="text-dark2 text-sm font-semibold" for="password">Password</label>
               <input
              type="password"
              placeholder="Password"
              class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
            />
              </div>
              <div class="">
                <label class="text-dark2 text-sm font-semibold" for="c_password">Confirm Password</label>
                
                 <input
              type="password"
              placeholder="Confirm Password"
              class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
            />
              </div>
              
              
              <div class="flex items-start">
                <input
                  type="checkbox"
                  id="terms"
                  class="mt-1 rounded border-gray-2 text-pribg-primary focus:ring-pribg-primary"
                />
                <label for="terms" class="ml-2 text-gray text-sm peer-checked:bg-pribg-primary peer-checked:border-pribg-primary peer-checked:text-white inline-block">
                  Send important information and login details to the provided
                  email address for documentation.
                </label>
              </div>
              <button
                class="w-full bg-primary text-white py-3 rounded bg-blue-500 transition"
              >
                Register
              </button>
              <p class="text-center text-primary">
                Already have an account?
                <a href="/onboarding/login/login.html" class="text-primary hover:underline">Sign In</a>
              </p>
            </form>
          </div>
        </div>
        <div class="w-full hidden lg:flex justify-center items-center">
          <img
            src="../../assets/images/onboarding/signup3.svg"
            alt="Clothes rack"
            class="w-full max-w-lg object-cover rounded-lg "
          />
        </div>
      </div>
    </div>
  </body>
</html>
