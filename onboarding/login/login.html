<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../../assets/css/main.css" />
        <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">

  </head>
  <body>
    <div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
      <div class="w-full max-w-6xl flex flex-col lg:flex-row gap-8">
        <!-- Login Form Section -->
        <div class="w-full lg:w-1/2 bg-white rounded-lg shadow-sm p-8">
          <div class="mb-8">
            <div class="w-12 h-12  rounded-lg flex items-center justify-center">
              <img src="../../assets/icons/logo.svg" alt="Logo"  />
            </div>
            <h1 class="text-2xl font-semibold mb-2">Get Started Here!</h1>
            <p class="text-gray-600">
              Be a part of the community of shoppers starting now.
            </p>
          </div>
           <form class="space-y-4">
              <div class="">
                <label class="text-dark2 text-sm font-semibold" for="email"
                  >Email Address</label
                >

                <input
                  type="email"
                  placeholder="Email Address"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div class="">
                <label class="text-dark2 text-sm font-semibold" for="password"
                  >Password</label
                >
                <input
                  type="password"
                  placeholder="Password"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div class="flex justify-between">
                <div class="flex items-start">
                  <input
                    type="checkbox"
                    id="remember"
                    class="mt-1 rounded border-gray-2 text-pribg-primary focus:ring-pribg-primary"
                  />
                  <label
                    for="remember"
                    class="ml-2 text-gray text-sm peer-checked:bg-pribg-primary peer-checked:border-pribg-primary peer-checked:text-white inline-block"
                  >
                    Keep me signed in
                  </label>
                </div>
                 
              <a href="forgot-password.html" class="text-black hover:underline"
                >Forget Password</a
              >
              </div>
              <button
                class="w-full bg-primary text-white py-3 rounded bg-blue-500 transition"
              >
                Sign in
              </button>
              
              <p class="text-center text-primary">
                Don't have an account?
                <a href="signup2.html" class="text-primary hover:underline"
                  >Sign Up</a
                >
              </p>    
            </form>
        </div>
        <div class="w-full hidden lg:block lg:w-1/2 space-y-4">
          <img src="../../assets/images/signin.png" />
        </div>
      </div>
    </div>
  </body>
</html>
