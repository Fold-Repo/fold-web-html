<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
 <link rel="stylesheet" href="/assets/css/app.css">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container-fluid min-h-screen  overflow-x-hidden">

      <div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
        <div class="w-full container flex flex-col items-center lg:flex-row gap-8">
          <!-- Login Form Section -->
          <div class="w-full  container lg:max-w-xl mx-auto  bg-white rounded-lg border-2 border-blue-500 shadow-md p-8">
            <div class="mb-8 flex flex-col justify-center items-center mt-10">
              <div class="w-12 h-12  rounded-lg flex items-center justify-center">
                <img src="../../assets/images/fold..svg" alt="Logo"  />
              </div>
              <h1 class="text-2xl font-semibold mb-2">Get Started Here!</h1>
              <p class="text-gray-600">
                Be a part of the community of shoppers starting now.
              </p>
            </div>
             <form class="space-y-4 py-4 mb-20">
                <div class="">
                  <label class="text-slate-500 text-sm font-semibold" for="email"
                    >Email Address</label
                  >
  
                  <input
                    type="email"
                    placeholder="Email Address"
                    class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                  />
                </div>
  
                <div class="">
                  <label class="text-slate-500 text-sm font-semibold" for="password"
                    >Password</label
                  >
                  <input
                    type="password"
                    placeholder="Password"
                    class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                  />
                </div>
  
                <div class="flex justify-between">
                  <div class="flex items-start">
                    <input
                      type="checkbox"
                      id="remember"
                      class="mt-1 rounded border-gray-200 text-blue-500 focus:ring-blue-500"
                    />
                    <label
                      for="remember"
                      class="ml-2 text-gray text-sm peer-checked:bg-blue-500 peer-checked:border-blue-500 peer-checked:text-white inline-block"
                    >
                      Keep me signed in
                    </label>
                  </div>
                   
               
                </div>
                <button
                  class="w-full bg-blue-500 text-white py-3 rounded  transition"
                >
                  Sign in
                </button>
                
                <p class="text-center text-blue-500">
                  Don't have an account?
                  <a href="/onboarding/signup/signup2.html" class="text-blue-500 hover:underline"
                    >Sign Up</a
                  >
                </p>    
              </form>
          </div>

         
        </div>
      </div>
     
    </main>
  </body>
</html>
