<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./assets/css/main.css" />
        <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">

  </head>
  <body>
    <div class="min-h-screen mt-12 lg:mt-2 bg-white p-4 md:p-8">
      <div class="max-w-xl  py-6 mx-auto">
        <div class="px-12 border-primary border shadow-md py-6 mx-auto gap-8">
          <div class="w-full max-w-lg">
            <div class="mb-8 flex gap-3 justify-center items-center">
              <div class="w-12 h-12 rounded-md">
                <img src="./assets/icons/logo.svg" alt="Logo" class="w-full" />
              </div>
              <h4
                class="text-dark font-medium text-[24px] leading-[29.16px]"
                style="font-style: italic"
              >
                Full Logo Goes Here
              </h4>
            </div>
            <div class="text-center">
              <h2 class="text-xl font-semibold text-dark mb-2">
                Get Started Here!
              </h2>
              <p class="text-[#4B5563] text-[20px] mb-6">
                Be a part of the community of shoppers starting now.
              </p>
            </div>
            <form class="space-y-4">
              <div class="">
                <label class="text-dark2 text-sm font-semibold" for="email"
                  >Email Address</label
                >

                <input
                  type="email"
                  placeholder="Email Address"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div class="">
                <label class="text-dark2 text-sm font-semibold" for="password"
                  >Password</label
                >
                <input
                  type="password"
                  placeholder="Password"
                  class="w-full px-4 py-3 text-sm rounded border border-gray-2 focus:border-pribg-primary focus:ring-2 focus:ring-blue-100 outline-none transition"
                />
              </div>

              <div class="flex justify-between">
                <div class="flex items-start">
                  <input
                    type="checkbox"
                    id="remember"
                    class="mt-1 rounded border-gray-2 text-pribg-primary focus:ring-pribg-primary"
                  />
                  <label
                    for="remember"
                    class="ml-2 text-gray text-sm peer-checked:bg-pribg-primary peer-checked:border-pribg-primary peer-checked:text-white inline-block"
                  >
                    Keep me signed in
                  </label>
                </div>
                 
              <a href="forgot-password.html" class="text-black hover:underline"
                >Forget Password</a
              >
              </div>
              <button
                class="w-full bg-primary text-white py-3 rounded hover:bg-blue-500 transition"
              >
                Sign in
              </button>
              <p class="text-center text-primary">
                Don't have an account?
                <a href="signup2.html" class="text-primary hover:underline"
                  >Sign Up</a
                >
              </p>
            </form>
          </div>
        </div>
       
      </div>
  </body>
</html>
