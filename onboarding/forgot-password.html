<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Recovery</title>
    <!-- <link rel="stylesheet" href="./assets/css/main.css" />
    <script src="https://cdn.tailwindcss.com"></script> -->
     <link rel="stylesheet" href="/assets/css/app.css">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container-fluid mx-auto overflow-x-hidden">

      <!-- Password Reset Request Page -->
      <div class="min-h-screen flex items-center">
        <!-- Left side - Form -->
        <div class="w-full md:w-1/2 flex items-center justify-center p-4">
          <div class="w-full max-w-lg mx-auto  p-8 bg-gray-50 border-gray-100 border-2 rounded-lg">
            <div class="mb-8 text-center">
              <h2 class="text-2xl text-gray-800 font-semibold mb-2">
                Forgot Password?
              </h2>
              <p class="text-gray-800">
                Be a part of the community of shoppers starting now.
              </p>
            </div>
  
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-800 mb-1"
                  >Email Address</label
                >
                <input
                  type="email"
                   class="w-full px-4 py-3 text-sm rounded border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition"
                  placeholder="Enter your email"
                />
              </div>
  
              <div class="space-y-4 pt-6">
                <button
                  class="w-full py-3.5 px-4 bg-blue-500 text-white rounded-md hover:bg-sky-600 transition-colors"
                >
                  Reset Password
                </button>
  
                <button
                  class="w-full py-3.5 text-sm px-4 border border-blue-500 text-blue-500 rounded-md hover:bg-gray-50 transition-colors"
                >
                  Back
                </button>
              </div>
            </div>
          </div>
        </div>
  
        <!-- Right side - Image -->
        <div class="hidden p-12 md:block  md:w1/3">
          <div class="w-full inset-0 overflow-hidden">
            <img
              src="../assets/images/onboarding/forgot-password.svg"
              alt="Shopping"
              class="w-full h-full object-cover"
            />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
