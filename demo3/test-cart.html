<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Main Container -->
    <div class="max-w-screen-xl mx-auto p-4">

        <!-- Header -->
        <header class="flex items-center justify-between mb-6">
            <a href="#" class="text-blue-500 font-semibold text-lg">Shopping Cart</a>
        </header>

        <!-- Cart Items -->
        <div class="space-y-6">
            <!-- Item 1 -->
            <div class="flex items-center justify-between bg-white shadow-lg rounded-lg p-4 hover:shadow-2xl transition-shadow duration-300">
                <div class="flex items-center space-x-4">
                    <img src="https://via.placeholder.com/150" alt="Construction Boots Emil 4" class="w-24 h-24 object-cover rounded-md transition-transform duration-300 transform hover:scale-105">
                    <div>
                        <h3 class="text-lg font-semibold">Construction Boots Emil 4.</h3>
                        <p class="text-gray-500">N114,000.00</p>
                        <p class="text-green-500">In stock</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <select class="border rounded-md p-2">
                        <option>XL</option>
                        <option>XXL</option>
                    </select>
                    <select class="border rounded-md p-2">
                        <option>Blue</option>
                        <option>Black</option>
                    </select>
                    <input type="number" class="border rounded-md p-2 w-20" value="10">
                    <button class="text-red-500 hover:text-red-700">Delete</button>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="flex items-center justify-between bg-white shadow-lg rounded-lg p-4 hover:shadow-2xl transition-shadow duration-300">
                <div class="flex items-center space-x-4">
                    <img src="https://via.placeholder.com/150" alt="Construction Boots Emil 4" class="w-24 h-24 object-cover rounded-md transition-transform duration-300 transform hover:scale-105">
                    <div>
                        <h3 class="text-lg font-semibold">Construction Boots Emil 4.</h3>
                        <p class="text-gray-500">N114,000.00</p>
                        <p class="text-green-500">In stock</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <select class="border rounded-md p-2">
                        <option>XL</option>
                        <option>XXL</option>
                    </select>
                    <select class="border rounded-md p-2">
                        <option>Blue</option>
                        <option>Black</option>
                    </select>
                    <input type="number" class="border rounded-md p-2 w-20" value="10">
                    <button class="text-red-500 hover:text-red-700">Delete</button>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="flex items-center justify-between bg-white shadow-lg rounded-lg p-4 hover:shadow-2xl transition-shadow duration-300">
                <div class="flex items-center space-x-4">
                    <img src="https://via.placeholder.com/150" alt="Construction Boots Emil 4" class="w-24 h-24 object-cover rounded-md transition-transform duration-300 transform hover:scale-105">
                    <div>
                        <h3 class="text-lg font-semibold">Construction Boots Emil 4.</h3>
                        <p class="text-gray-500">N114,000.00</p>
                        <p class="text-green-500">In stock</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <select class="border rounded-md p-2">
                        <option>XL</option>
                        <option>XXL</option>
                    </select>
                    <select class="border rounded-md p-2">
                        <option>Blue</option>
                        <option>Black</option>
                    </select>
                    <input type="number" class="border rounded-md p-2 w-20" value="10">
                    <button class="text-red-500 hover:text-red-700">Delete</button>
                </div>
            </div>
        </div>

        <!-- Payment Summary -->
        <div class="bg-white p-6 rounded-lg shadow-lg mt-8">
            <div class="flex justify-between mb-4">
                <p class="text-lg">Subtotal</p>
                <p class="text-lg">N11,000,000</p>
            </div>
            <div class="flex justify-between mb-4">
                <p class="text-lg">Discount</p>
                <p class="text-lg">-10,000</p>
            </div>
            <div class="flex justify-between mb-4">
                <p class="text-lg">Delivery</p>
                <p class="text-lg">+100,000</p>
            </div>
            <div class="flex justify-between mb-4">
                <p class="text-lg">Tax</p>
                <p class="text-lg">+120,000</p>
            </div>
            <div class="flex justify-between font-semibold">
                <p class="text-xl">Total</p>
                <p class="text-xl">N11,140,000</p>
            </div>

            <!-- Buttons -->
            <div class="flex space-x-4 mt-6">
                <button class="bg-blue-500 text-white py-2 px-4 rounded-lg w-full hover:bg-blue-600 transition-colors">Proceed to Checkout</button>
                <button class="bg-gray-200 py-2 px-4 rounded-lg w-full hover:bg-gray-300 transition-colors">Continue Shopping</button>
            </div>
        </div>
    </div>

</body>

</html>
