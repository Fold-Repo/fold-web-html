<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery</title>
     <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<script src="https://cdn.tailwindcss.com"></script>

       <script src="/assets/script.js"></script>
       <script src="/assets/js/demo1.js"></script>
      <!-- Google Fonts links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
</head>
<body >
    <main class=" p-6">
        <div class=" bg-white p-8 mx-auto ">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Delivery Information -->
                <div class="bg-white p-6 max- lg:w-2xl shadow-md border rounded-md">
                    <h2 class="text-lg font-semibold mb-4">Delivery Information</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-700">First Name</label>
                            <input type="text" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700">Last Name</label>
                            <input type="text" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm text-gray-700">Address</label>
                            <input type="text" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700">City/Town</label>
                            <input type="text" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700">Zip Code</label>
                            <input type="text" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700">Mobile Number</label>
                            <input type="text" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-700">Email Address</label>
                            <input type="email" placeholder="Placeholder" class="w-full p-2 border border-gray-300 rounded-md">
                        </div>
                    </div>
                </div>
    
                <!-- Payment Information -->
                <div class="bg-white w-md p-6 shadow-md border rounded-md">
                    <h2 class="text-lg font-semibold mb-4">Payment Information</h2>
                    <div class="mb-4">
                        <p class="text-sm text-gray-700 font-medium">Pay With</p>
                        <div class="flex items-center space-x-4 mt-2">
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" name="payment-method" value="card" checked class="payment-method hidden">
                                <div class="w-5 h-5 border-2 border-gray-400 rounded-full flex items-center justify-center">
                                    <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
                                </div>
                                <span class="text-gray-700 text-sm">Debit or Credit Card</span>
                            </label>
                            <label class="flex items-center space-x-2 cursor-pointer">
                                <input type="radio" name="payment-method" value="cod" class="payment-method hidden">
                                <div class="w-5 h-5 border-2 border-gray-400 rounded-full flex items-center justify-center"></div>
                                <span class="text-gray-700 text-sm">Pay on Delivery</span>
                            </label>
                        </div>
                    </div>
    
                    <!-- Card Payment Fields -->
                    <div id="card-payment-section">
                        <label class="block text-sm text-gray-700">Cardholder Name</label>
                        <input type="text" id="cardholder-name" placeholder="Alexander McPherson Grey" class="w-full p-2 border border-gray-300 rounded-md mb-3">
    
                        <label class="block text-sm text-gray-700">Card Number</label>
                        <input type="text" id="card-number" placeholder="5031 2345 6789 1234" class="w-full p-2 border border-gray-300 rounded-md mb-3">
    
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-700">Expiry Date</label>
                                <input type="text" id="expiry-date" placeholder="09/2026" class="w-full p-2 border border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-700">CVV</label>
                                <input type="text" id="cvv" placeholder="123" class="w-full p-2 border border-gray-300 rounded-md">
                            </div>
                        </div>
                    </div>
    
                    <!-- Payment Summary -->
                    <div class="border-t border-gray-300 my-4"></div>
                    <div class="text-sm text-gray-700 space-y-2">
                        <div class="flex justify-between"><span>Sub Total</span><span id="subtotal">$648.00</span></div>
                        <div class="flex justify-between"><span>Tax (10%)</span><span id="tax">$54.00</span></div>
                        <div class="flex justify-between"><span>Shipping</span><span id="shipping">$0.00</span></div>
                        <div class="border-t border-gray-300 my-2"></div>
                        <div class="flex justify-between font-semibold text-lg"><span>Total</span><span id="total-amount">$250.32</span></div>
                    </div>
    
                    <button id="pay-button" class="w-full bg-blue-500 text-white font-semibold py-3 rounded-md mt-4 hover:bg-blue-600">
                        Pay $250.32
                    </button>
                </div>
            </div>
        </div>

    </main>

    
</body>
</html>
