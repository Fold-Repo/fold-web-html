<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <!-- <link rel="stylesheet" href="/assets/css/main.css" /> -->
   <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<script src="https://cdn.tailwindcss.com"></script>

       <script src="/assets/script.js"></script>
       <script src="/assets/js/demo1.js"></script>
      <!-- Google Fonts links -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
</head>
<body class="bg-[#F9FAFB]">
  
    <main class="container mx-auto py-6 lg:py-12 px-8">

           <nav class=" mb-6 mx-4 text-sm font-medium text-gray-500">
         <ul class="flex items-center space-x-2">
             <li><a href="#" class="text-blue-400 hover:underline">Men</a></li>
             <li><span class="text-gray-500">/</span></li>
             <li><a href="#" class="text-blue-400 hover:underline">Lifestyle</a></li>
             <li><span class="text-gray-500">/</span></li>
                <li><a href="#" class="text-blue-400 hover:underline">Shoes</a></li>
                <li><span class="text-gray-500">/</span></li>
                <li><span class="text-gray-600">Nike Blazer Low '77 Vintage</span></li>
         </ul>
     </nav>
    <!-- Product Container -->
     <div class="flex flex-col lg:flex-row lg:gap-8">

         <!-- Product Image Gallery -->
         <div class="lg:w-2/5  mx-4">
             <img id="main-product-image" src="" alt="Main product image" class="w-full rounded-xl"/>

             <div class="flex mt-4  space-x-2" id="thumbnails-container">
                 <!-- Product thumbnails will be rendered here -->
             </div>
         </div>

        <!-- Product Details -->
         <div class="lg:w-3/5 mt-4 lg:mt-0 mx-4">
             <h1 id="product-name" class="text-2xl font-bold text-gray-900"></h1>
             <p id="product-description" class="text-gray-600 mt-2"></p>
            <div class="flex items-center mt-2 space-x-1">
                <div id="product-rating" class="flex text-gray-500">
                     <!-- Product Rating Stars -->
                 </div>
                 <span id="product-rating-count" class="text-sm text-[#1D2739] ml-2"></span>
            </div>
        
           <div class="text-gray-600 mt-2">
              <p id="product-price" class="text-xl font-bold mt-2">
                <!-- product price here -->
               </p>
             <p id="product-offer-price" class="text-gray-600 text-sm">
               <!-- product discount price  -->
              </p>
           </div>

              <div class="mt-4">
                   <h3 class="font-medium text-sm mb-1">Choose a Color</h3>
                 <div id="color-options" class="flex space-x-2">
                  <!-- Color options will be rendered here -->
                 </div>
             </div>
              <div class="mt-4">
              
                 <h3 class="font-medium text-sm mb-1">Select Size</h3>
                 <div class="flex flex-wrap gap-3" id="size-options">
                   <!-- product Size options here -->
                  </div>
                 <p class="text-[#0EA5E9] text-sm ml-auto mt-1"> Size Guide </p>
             </div>

              <div class="mt-4  items-center ">
                  <div class="flex justify-between items-center">
                      <div class="space-x-3 items-center flex" >
                           <h3 class="font-medium text-sm ">Quantity</h3>
                       <div class=" flex items-center">
                             <button id="decrease-qty" class="bg-gray-100 border-gray-300 border rounded-md px-2 py-1">-</button>
                              <span id="qty-value" class="mx-2">1</span>
                             <button id="increase-qty" class="bg-gray-100 border-gray-300 border rounded-md px-2 py-1">+</button>
                         </div>
                      </div>
                          <span class="text-gray-500 text-sm">Only <span id="qty-left"></span> Items Left! Don't miss it</span>
                  </div>
                  <div class="flex mt-2 gap-2">
                        <button  class="   bg-[#0EA5E9] rounded-full text-white  font-semibold px-4 py-3  w-40 hover:bg-[#0873AA] transition"> Buy Now </button>
                         <button class=" bg-white border border-[#0EA5E9] text-[#0EA5E9] font-semibold px-4 py-3 rounded-full w-40 hover:bg-gray-100 transition">Add to Cart</button>
                    </div>
              </div>
              <div class="mt-6  border border-gray-400 rounded-md p-3  flex  items-center space-x-2">
                 <svg width="30" height="27" viewBox="0 0 30 27" fill="none" xmlns="http://www.w3.org/2000/svg">
<path fill-rule="evenodd" clip-rule="evenodd" d="M14.6002 0.164062L5.96813 0.684635C3.91236 0.808612 2.09858 2.02531 1.26202 3.84151L0.507678 5.47924C-0.305988 7.24575 -0.065308 9.29881 1.13674 10.8453L1.49366 11.3045L1.98535 21.7422C2.11953 24.5906 4.55188 26.8333 7.50692 26.8333H21.6934C24.6484 26.8333 27.0808 24.5906 27.215 21.7422L27.6977 11.4954C29.0123 10.3096 29.4967 8.45984 28.8656 6.78536L27.8811 4.17284C27.1298 2.17927 25.2255 0.804846 23.0314 0.672524L14.6002 0.164062ZM4.74614 21.6211L4.32769 12.7383C5.51134 12.8728 6.73307 12.6076 7.76666 11.9427L7.91018 11.8504C8.69056 11.3484 9.68987 11.2884 10.5288 11.6931L12.1283 12.4648C13.6844 13.2155 15.516 13.2155 17.072 12.4648L18.6716 11.6931C19.5105 11.2884 20.5098 11.3484 21.2901 11.8504L21.4337 11.9427C22.4673 12.6076 23.689 12.8728 24.8726 12.7383L24.4542 21.6211C24.3871 23.0453 23.1709 24.1667 21.6934 24.1667H18.8656L19.1449 20.9325C19.3664 18.367 17.2682 16.1667 14.6002 16.1667C11.9321 16.1667 9.83389 18.367 10.0555 20.9325L10.3348 24.1667H7.50692C6.02941 24.1667 4.81323 23.0453 4.74614 21.6211ZM22.9667 9.72393C23.7576 10.2328 24.7881 10.2328 25.5791 9.72393C26.2657 9.28227 26.5504 8.44495 26.2684 7.69667L25.2838 5.08415C24.9082 4.08737 23.9561 3.40016 22.859 3.334L14.6002 2.83593L6.14052 3.34611C5.11264 3.4081 4.20574 4.01644 3.78747 4.92455L3.03312 6.56227C2.62629 7.44553 2.74663 8.47206 3.34765 9.24531L3.80128 9.82892C4.56399 10.2299 5.50144 10.195 6.23367 9.72393L6.37719 9.63161C7.98275 8.59879 10.0388 8.47528 11.7647 9.30796L13.3642 10.0797C14.1423 10.455 15.0581 10.455 15.8361 10.0797L17.4356 9.30796C19.1616 8.47528 21.2176 8.59879 22.8231 9.63161L22.9667 9.72393ZM16.3908 20.7111L16.0923 24.1667H13.108L12.8095 20.7111C12.7222 19.7003 13.5489 18.8333 14.6002 18.8333C15.6514 18.8333 16.4781 19.7003 16.3908 20.7111Z" fill="#0EA5E9"/>
</svg>

                <div class="flex-1">
                  <span class="text-sm font-medium "> Free Delivery</span>
                    <p class="text-xs text-[#667185] underline">  Enter your Postal Code for Delivery Availability</p>
                </div>
            
              </div>
         </div>
       
     </div>
             <div class="mt-12 mb-4 mx-4 flex items-center space-x-4">
                     <button class="text-sm text-gray-700  border-b-2 border-[#0EA5E9] pb-1 ">Review</button>
                     <button class="text-sm text-gray-500 hover:text-gray-700 border-b-2 border-transparent pb-1 ">Product Details</button>
                   <button class="text-sm text-gray-500 hover:text-gray-700 border-b-2 border-transparent pb-1">Lifestyle</button>
             </div>
              <div id="review" class=" mx-4 space-y-4">
                 <!-- Product reviews will be rendered here -->
              </div>
       <h2 class="text-2xl font-semibold mt-12 mb-4 mx-4">Similar Items You Might Like</h2>
       <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 gap-6" id="product-list">
           <!-- product list -->
         </div>
  </main>
  
 
</body>
</html>
